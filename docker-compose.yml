name: toolmomo

services:
  toolmomo-preview:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toolmomo-preview
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "3001:3000"
    volumes:
      - toolmomo-jobs:/app/.toolmomo-jobs
    restart: unless-stopped

volumes:
  toolmomo-jobs:
